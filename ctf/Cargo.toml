[package]
name = "airmash-server-ctf"
version = "0.0.1"
authors = ["STEAMROLLER"]
license = "Apache-2.0 OR MIT"
publish = false
repository = 'https://github.com/steamroller-airmash/airmash-server'
edition = "2018"

[features]

[dependencies]
shred = "0.9"
specs = { version = "0.15", features = ["nightly"] }
shrev = "1.1"
fnv = "*"
log = "*"
rand = "0.4"
specs-derive = "*"
lazy_static = "*"
htmlescape = "*"
env_logger = "*"
serde = { version = "*", features = [ "derive" ]}
serde-deserialize-over = { git="https://github.com/steamroller-airmash/serde-deserialize-over" }
serde_json = "*"
clap = "*"

[dependencies.sentry]
optional = true
version = "*"

[dependencies.airmash-server]
path = '../server'
# Enable looking for X-Forwarded-For within the request
features = [ "proxied" ]
